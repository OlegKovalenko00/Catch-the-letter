services:
  app:
    build: .
    depends_on:
      - browser-worker
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    env_file:
      - .env
    command:
      - --config
      - /app/config/app.json
      - --events-limit
      - "${EVENTS_LIMIT:-200}"

  browser-worker:
    build:
      context: ./browser-worker
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - ./data/browser:/data/browser
    environment:
      - BROWSER_DATA_DIR=/data/browser

  ollama:
    image: ollama/ollama:latest
    profiles:
      - llm
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
