services:
  app:
    build: .
    depends_on:
      - browser-worker
    env_file:
      - path: .env
        required: false
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    entrypoint: []
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TELEGRAM_PROXY_URL: ${TELEGRAM_PROXY_URL:-}
    command:
      - /app/catch_the_letter
      - --config
      - /app/config/app.json

  browser-worker:
    build:
      context: ./browser-worker
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - ./data/browser:/data/browser
    environment:
      - BROWSER_DATA_DIR=/data/browser
      - BROWSER_SESSION_TTL_SECONDS=3600

  ollama:
    image: ollama/ollama:latest
    profiles:
      - llm
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
